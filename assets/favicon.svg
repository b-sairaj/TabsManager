<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0b5f58"/>
    </linearGradient>
    <linearGradient id="activeCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ccfbf1" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- ── Row 1 ── -->

  <!-- Active tab cell (top-left, highlighted) -->
  <rect x="14" y="14" width="42" height="26" rx="7" ry="7" fill="url(#activeCell)" filter="url(#shadow)"/>
  <!-- Active indicator dot -->
  <circle cx="25" cy="27" r="4" fill="#0f766e"/>
  <!-- Active tab label line -->
  <rect x="33" y="24" width="16" height="5" rx="2.5" fill="#0f766e" opacity="0.55"/>

  <!-- Tab cell top-right -->
  <rect x="72" y="14" width="42" height="26" rx="7" ry="7" fill="#ffffff" opacity="0.18"/>
  <rect x="83" y="24" width="20" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>

  <!-- ── Row 2 ── -->
  <rect x="14" y="51" width="42" height="26" rx="7" ry="7" fill="#ffffff" opacity="0.18"/>
  <rect x="25" y="61" width="20" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>

  <rect x="72" y="51" width="42" height="26" rx="7" ry="7" fill="#ffffff" opacity="0.18"/>
  <rect x="83" y="61" width="20" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>

  <!-- ── Row 3 ── -->
  <rect x="14" y="88" width="42" height="26" rx="7" ry="7" fill="#ffffff" opacity="0.18"/>
  <rect x="25" y="98" width="20" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>

  <rect x="72" y="88" width="42" height="26" rx="7" ry="7" fill="#ffffff" opacity="0.18"/>
  <rect x="83" y="98" width="20" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>
</svg>
